<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金条管家 v1.1 - 主面板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 性能优化 - 减少重绘和回流 */
        .task-checkbox,
        .pin-btn {
            will-change: transform;
            backface-visibility: hidden;
        }

        /* 自定义滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 25%, #16213e 50%, #0f3460 75%, #533483 100%);
            background-size: 400% 400%;
            animation: gradientShift 30s ease infinite;
            min-height: 100vh;
            padding: 20px 20px 140px 20px; /* 底部留出空间给固定Footer */
            line-height: 1.6;
            color: #ffffff;
            overflow-y: auto; /* 改为整个界面滚动 */
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            25% {
                background-position: 100% 50%;
            }

            50% {
                background-position: 100% 100%;
            }

            75% {
                background-position: 0% 100%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            padding: 30px 0 20px 0;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 4px;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57);
            border-radius: 2px;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {

            0%,
            100% {
                opacity: 0.6;
                transform: translateX(-50%) scaleX(1);
            }

            50% {
                opacity: 1;
                transform: translateX(-50%) scaleX(1.2);
            }
        }

        .header h1 {
            font-size: 3.2em;
            margin-bottom: 12px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            animation: gradientText 6s ease infinite;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        @keyframes gradientText {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        .header p {
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            margin-top: 15px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .nav-links a {
            display: inline-flex;
            align-items: center;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            border-radius: 16px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s;
        }

        .nav-links a:hover::before {
            left: 100%;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .nav-links a.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(30px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .controls::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        }

        .status-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            animation: pulse 2s infinite;
            box-shadow: 0 0 15px rgba(78, 205, 196, 0.6);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.2);
            }
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            color: white;
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-danger:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-success:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.4);
        }

        .btn-warning {
            background: linear-gradient(135deg, #feca57, #ff9ff3);
            color: white;
            box-shadow: 0 6px 20px rgba(254, 202, 87, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-warning:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(254, 202, 87, 0.4);
        }

        .data-table-container {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(40px);
            overflow: visible; /* 移除内部滚动，允许页面滚动 */
            /* 性能优化 - 移除content-visibility以避免影响sticky */
            height: auto; /* 移除固定高度 */
            min-height: 500px;
            box-shadow:
                0 25px 50px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            position: relative;
            user-select: none;
            -webkit-overflow-scrolling: touch;
        }

        /* 框选功能样式 */
        .selection-box {
            position: absolute;
            border: 2px dashed #4ecdc4;
            background: rgba(78, 205, 196, 0.1);
            pointer-events: none;
            z-index: 1000;
            border-radius: 4px;
        }

        .data-table {
            width: 100%;
            border-collapse: separate; /* 允许sticky生效 */
            border-spacing: 0;
            font-size: 14px;
            table-layout: fixed;
        }

        .data-table th {
            /* 使用更不透明的深色背景，防止滚动时内容透出 */
            background: #1e293b;
            color: #ffffff;
            padding: 18px 14px;
            text-align: center;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.8px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 20;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
        }

        .data-table th::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
        }

        .data-table th.sortable:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.12));
            cursor: pointer;
        }

        .sort-indicator {
            margin-left: 8px;
            font-size: 10px;
            display: inline-block;
            width: 10px;
            text-align: center;
        }

        .resizer {
            position: absolute;
            top: 0;
            right: 0;
            width: 5px;
            height: 100%;
            cursor: col-resize;
            background: rgba(255, 255, 255, 0.2);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .data-table th:hover .resizer {
            opacity: 1;
        }

        .th-content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .task-counter {
            position: relative;
            font-size: 10px;
            font-weight: 600;
            color: #c0c0c0;
            background: rgba(0, 0, 0, 0.25);
            padding: 2px 6px;
            border-radius: 6px;
            cursor: help;
        }

        .tooltip-text {
            visibility: hidden;
            width: max-content;
            max-width: 350px;
            background-color: #2c3e50;
            color: #fff;
            text-align: left;
            border-radius: 8px;
            padding: 10px;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s;
            white-space: normal;
            font-size: 12px;
            font-weight: normal;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        .task-counter:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }

        .tooltip-account-name {
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.2s;
            display: block;
        }

        .tooltip-account-name:hover {
            background-color: rgba(78, 205, 196, 0.2);
        }

        @keyframes row-highlight-animation {
            0% {
                background-color: rgba(78, 205, 196, 0.4);
            }
            100% {
                background-color: transparent;
            }
        }

        .row-highlight {
            animation: row-highlight-animation 3s ease-out forwards;
        }

        .data-table td {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* 优化 Hover 性能：移除 transform 和 box-shadow */
        .data-table tr:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.001);
        }
        
        .data-table tr:hover td {
             box-shadow: 0 0 20px rgba(255, 255, 255, 0.05) inset;
        }

        .account-name {
            font-weight: 700;
            color: #4ecdc4;
            text-align: left !important;
            padding-left: 16px !important;
            line-height: 1.3;
        }

        .level-input,
        .notes-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 8px 10px;
            color: #ffffff;
            font-size: 12px;
            width: 100%;
            max-width: 80px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .level-input:focus,
        .notes-input:focus {
            outline: none;
            border-color: #4ecdc4;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 2px rgba(78, 205, 196, 0.2);
        }

        .group-select {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 8px 10px;
            color: #ffffff;
            font-size: 12px;
            width: 100%;
            max-width: 150px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .group-select:focus {
            outline: none;
            border-color: #4ecdc4;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 0 2px rgba(78, 205, 196, 0.2);
        }

        .group-select option {
            background: #1a1a2e;
            color: #ffffff;
            padding: 8px;
        }

        .data-table tr {
            cursor: default;
            transition: background-color 0.15s ease;
        }

        .data-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .auto-group-hint {
            font-size: 10px;
            color: #888;
            margin-left: 5px;
        }

        .notes-input {
            max-width: 120px;
        }

        .level-input {
            max-width: 60px;
        }

        .level-input::-webkit-outer-spin-button,
        .level-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .checkbox-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .task-checkbox {
            width: 28px;
            height: 28px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            appearance: none;
            -webkit-appearance: none;
            backdrop-filter: blur(10px);
        }

        .task-checkbox:checked {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            border-color: #4ecdc4;
            animation: checkboxSuccess 0.6s ease;
        }

        @keyframes checkboxSuccess {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .task-checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            font-weight: bold;
            animation: checkmarkAppear 0.3s ease 0.2s both;
        }

        @keyframes checkmarkAppear {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .task-checkbox:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .quantity-display {
            font-size: 1.2em;
            font-weight: 800;
            background: linear-gradient(135deg, #feca57, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .change-display {
            font-weight: bold;
            text-align: center;
            font-size: 12px;
        }

        .change-display.positive {
            color: #4ecdc4;
        }

        .change-display.negative {
            color: #ff6b6b;
        }

        .pin-btn {
            background: linear-gradient(135deg, #feca57, #ff9ff3);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.15s ease;
            margin-right: 4px;
            will-change: transform, box-shadow;
        }

        .pin-btn.pinned {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
        }

        .pin-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 2px 8px rgba(254, 202, 87, 0.3);
        }

        .pin-btn.pinned:hover {
            box-shadow: 0 4px 12px rgba(78, 205, 196, 0.4);
        }

        .pinned-row {
            background: rgba(78, 205, 196, 0.1) !important;
            border-left: 3px solid #4ecdc4;
        }

        .banned-row {
            opacity: 0.4;
            filter: grayscale(80%);
        }

        .ban-status {
            color: #ff6b6b;
            font-size: 10px;
            font-weight: bold;
            line-height: 1;
            white-space: nowrap;
        }

        .banned-section-header td {
            background-color: rgba(44, 62, 80, 0.7) !important;
            text-align: center;
            font-weight: bold;
            color: #f39c12;
            padding: 2px 0 !important;
            border-top: 1px solid #f39c12;
            border-bottom: 1px solid #f39c12;
            line-height: 1.2;
        }

        .banned-section-title {
            font-size: 1em;
            letter-spacing: 1px;
        }
        .countdown {
            font-weight: normal;
            color: #f1c40f;
        }

        .pinned-row:hover {
            background: rgba(78, 205, 196, 0.15) !important;
        }

        .delete-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }

        .ban-btn {
            background: linear-gradient(135deg, #8395a7, #576574);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .ban-btn.is-banned {
            background: linear-gradient(135deg, #2ecc71, #3498db);
        }

        .ban-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(131, 149, 167, 0.4);
        }


        /* 主要按钮样式 */
        .main-buttons {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .container {
                max-width: 100%;
                padding: 0 15px;
            }

            .header h1 {
                font-size: 2.8em;
            }

            .nav-links {
                gap: 15px;
            }

            .nav-links a {
                padding: 10px 18px;
                font-size: 13px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 30px 0;
                margin-bottom: 30px;
            }

            .header h1 {
                font-size: 2.2em;
            }

            .header p {
                font-size: 1em;
            }

            .nav-links {
                gap: 10px;
                margin-bottom: 30px;
            }

            .nav-links a {
                padding: 8px 14px;
                font-size: 12px;
            }

            .controls {
                flex-direction: column;
                gap: 15px;
                padding: 16px;
            }

            .controls>div {
                width: 100%;
            }

            .main-buttons {
                justify-content: center;
                gap: 8px;
            }

            .reset-buttons {
                justify-content: center;
                padding: 10px;
            }

            .reset-buttons .btn {
                font-size: 11px;
                padding: 6px 10px;
            }

            .data-table-container {
                border-radius: 16px;
                overflow-x: auto;
            }

            .data-table {
                min-width: 800px;
            }

            .data-table th,
            .data-table td {
                padding: 10px 8px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.8em;
            }

            .nav-links a {
                padding: 6px 10px;
                font-size: 11px;
            }

            .controls {
                padding: 12px;
            }

            .data-table th,
            .data-table td {
                padding: 8px 6px;
                font-size: 11px;
            }
        }

        /* 页面加载动画 */
        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;

<body>
    <div class="container fade-in">

                    <button class="btn btn-warning" onclick="resetGoldChange()">🔄 重置变化</button>

        <!-- 总计信息卡片 -->

                <div class="summary-title">🎮 封禁 / 总数</div>

        <div id="dataContainer" class="page-transition">

    <!-- 初始化弹窗 -->

            <div class="progress-bar-container">
                <div id="initializationProgressBar" class="progress-bar">0%</div>
            </div>
            <p id="initializationProgressStatus">正在初始化...</p>
        </div>

    <!-- 进度条弹窗 -->

        <div class="modal-content">
            <h3>📄 正在导出数据...</h3>
            <div class="progress-bar-container">
                <div id="progressBar" class="progress-bar">0%</div>
            </div>
            <p id="progressStatus">正在初始化...</p>
        </div>
    </div>


    <script>
        let socket; // 将socket提升为全局变量
        let refreshInterval;
        let accountsData = [];
        let allRowsData = []; // 用于虚拟滚动的完整数据源
        let virtualScrollState = {
            rowHeight: 60, // 估算行高
            buffer: 5,     // 减少缓冲行数以提高性能
            container: null,
            lastStartIndex: -1,
            lastEndIndex: -1
        };
        let allGroups = [];
        let sortColumn = 'account_name'; // 默认按账号名排序
        let sortDirection = 'asc'; // 默认升序
        let isUserInteracting = false;

        // 设置排序
        function setSort(sortKey) {
            if (sortColumn === sortKey) {
                // 如果点击的是当前排序列，则切换排序方向
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                // 否则，设置新的排序列
                sortColumn = sortKey;
                // --- 优化：如果是金条列，默认降序 ---
                if (sortKey === 'gold_quantity') {
                    sortDirection = 'desc'; // 金条数多的排在前面
                } else {
                    sortDirection = 'asc'; // 其他列默认升序
                }
            }
            loadData(true); // 重新加载数据以应用排序
        }
        let lastInteractionTime = 0;
        let lastDataHash = '';
        let isSaving = false; // 添加保存状态标志
        let isScrolling = false; // 添加滚动状态标志
        let scrollTimeout = null;

        // 框选功能变量
        let isSelecting = false;
        let selectionBox = null;
        let startX = 0;
        let startY = 0;

        function formatTime(timeString) {
            if (!timeString) return '--';
            const date = new Date(timeString);
            return date.toLocaleString('zh-CN');
        }

        // 生成数据哈希，用于检测数据变化
        function generateDataHash(data) {
            const hashData = data.map(account => ({
                account_name: account.account_name,
                gold_quantity: account.gold_quantity,
                gold_change: account.gold_change,
                weekly_fishing_done: account.weekly_fishing_done,
                weekly_boss_done: account.weekly_boss_done,
                weekly_alliance_done: account.weekly_alliance_done,
                weekly_points_done: account.weekly_points_done,
                collect_level: account.collect_level,
                craft_level: account.craft_level,
                combat_level: account.combat_level,
                notes: account.notes,
                group_name: account.group_name
            }));
            return JSON.stringify(hashData);
        }

        // 简化：不再保存和恢复复选框状态，完全依赖后端数据

        // 自然排序函数 - 正确处理数字排序，筑梦系列优先
        function naturalSort(a, b) {
            // 检查是否包含"筑梦"
            const aIsZhumeng = a.includes('筑梦');
            const bIsZhumeng = b.includes('筑梦');

            // 筑梦系列始终排在最前面
            if (aIsZhumeng && !bIsZhumeng) return -1;
            if (!aIsZhumeng && bIsZhumeng) return 1;

            const regex = /(\d+)|(\D+)/g;
            const aParts = a.match(regex) || [];
            const bParts = b.match(regex) || [];

            const maxLength = Math.max(aParts.length, bParts.length);

            for (let i = 0; i < maxLength; i++) {
                const aPart = aParts[i] || '';
                const bPart = bParts[i] || '';

                // 如果两个部分都是数字
                if (/^\d+$/.test(aPart) && /^\d+$/.test(bPart)) {
                    const aNum = parseInt(aPart);
                    const bNum = parseInt(bPart);
                    if (aNum !== bNum) {
                        return aNum - bNum;
                    }
                } else {
                    // 字符串比较
                    const result = aPart.localeCompare(bPart, 'zh-CN');
                    if (result !== 0) {
                        return result;
                    }
                }
            }

            return 0;
        }

        // 数字格式化：添加千分位逗号
        function formatNumber(num) {
            if (num === null || num === undefined || num === '') return '0';
            return parseInt(num).toLocaleString('zh-CN');
        }

        // 保存和加载列宽
        function saveColumnWidths() {
            const widths = {};
            document.querySelectorAll('.data-table th').forEach((th, index) => {
                widths[index] = th.style.width || 'auto';
            });
            localStorage.setItem('goldManagerColumnWidths', JSON.stringify(widths));
        }

        function loadColumnWidths() {
            const saved = localStorage.getItem('goldManagerColumnWidths');
            if (saved) {
                try {
                    const widths = JSON.parse(saved);
                    document.querySelectorAll('.data-table th').forEach((th, index) => {
                        if (widths[index] && widths[index] !== 'auto') {
                            th.style.width = widths[index];
                        }
                    });
                } catch (e) {
                    console.error('加载列宽失败:', e);
                }
            }
        }

        // 自动分组逻辑 - 按大区分组
        function getAutoGroup(windowTitle) {
            // 从窗口标题提取大区名：账号名 - - 大区名 - 明日之后
            if (windowTitle && windowTitle.includes(' - ') && windowTitle.includes(' - 明日之后')) {
                const parts = windowTitle.split(' - ');
                if (parts.length >= 3) {
                    // 大区名是倒数第二部分
                    const serverName = parts[parts.length - 2].trim();
                    return serverName || '未知大区';
                }
            }
            return '未知大区';
        }

        // 置顶账号管理
        function getPinnedAccounts() {
            const saved = localStorage.getItem('goldManagerPinnedAccounts');
            return saved ? JSON.parse(saved) : [];
        }

        function savePinnedAccounts(pinnedAccounts) {
            localStorage.setItem('goldManagerPinnedAccounts', JSON.stringify(pinnedAccounts));
        }

        function togglePinAccount(accountName) {
            const pinnedAccounts = getPinnedAccounts();
            const index = pinnedAccounts.indexOf(accountName);

            if (index > -1) {
                // 取消置顶
                pinnedAccounts.splice(index, 1);
            } else {
                // 添加置顶
                pinnedAccounts.push(accountName);
            }

            savePinnedAccounts(pinnedAccounts);
            loadData(true); // 重新加载数据
        }

        function isPinned(accountName) {
            return getPinnedAccounts().includes(accountName);
        }

        function createTableRow(account) {
            // 自动分组逻辑 - 使用大区名
            let autoGroup = getAutoGroup(account.window_title || account.account_name);
            let currentGroup = account.group_name || autoGroup;
            let pinned = isPinned(account.account_name);
            let isBanned = !!account.banned_until;

            return `
                <tr data-account="${account.account_name}" class="data-row ${pinned ? 'pinned-row' : ''} ${isBanned ? 'banned-row' : ''}">
                    <td>${autoGroup}</td>
                    <td class="account-name">
                        <div>${account.account_name}</div>
                        ${isBanned ? `<div class="ban-status">(解封倒计时: <span class="countdown" data-unban-date="${account.banned_until}"></span>)</div>` : ''}
                    </td>
                    <td>
                        <div class="checkbox-container">
                            <input type="checkbox" class="task-checkbox" data-field="weekly_fishing_done"
                                   ${account.weekly_fishing_done ? 'checked' : ''}>
                        </div>
                    </td>
                    <td>
                        <div class="checkbox-container">
                            <input type="checkbox" class="task-checkbox" data-field="weekly_boss_done"
                                   ${account.weekly_boss_done ? 'checked' : ''}>
                        </div>
                    </td>
                    <td>
                        <div class="checkbox-container">
                            <input type="checkbox" class="task-checkbox" data-field="weekly_alliance_done"
                                   ${account.weekly_alliance_done ? 'checked' : ''}>
                        </div>
                    </td>
                    <td>
                        <div class="checkbox-container">
                            <input type="checkbox" class="task-checkbox" data-field="weekly_points_done"
                                   ${account.weekly_points_done ? 'checked' : ''}>
                        </div>
                    </td>
                    <td class="quantity-display">${formatNumber(account.gold_quantity || 0)}</td>
                    <td class="change-display ${(account.change || 0) >= 0 ? 'positive' : 'negative'}">
                        ${(account.change || 0) >= 0 ? '+' : ''}${formatNumber(account.change || 0)}

        function updateSummaryCards(data) {
            if (data.length === 0) {
                document.getElementById('summaryCards').style.display = 'none';
                return;
            }

            const activeAccounts = data.filter(acc => !acc.banned_until);
            const totalGold = activeAccounts.reduce((sum, account) => sum + (account.gold_quantity || 0), 0);
            const totalChange = activeAccounts.reduce((sum, account) => sum + (account.change || 0), 0);
            
            const totalAccounts = data.length;
            const bannedCount = data.filter(acc => !!acc.banned_until).length;

            document.getElementById('totalGold').textContent = totalGold.toLocaleString();
            document.getElementById('totalChange').textContent = totalChange >= 0 ? `+${totalChange.toLocaleString()}` : totalChange.toLocaleString();
            document.getElementById('accountCount').textContent = `${bannedCount} / ${totalAccounts}`;

            document.getElementById('summaryCards').style.display = 'grid';
        }

        // 数据排序函数
        function sortData(data) {
            const pinnedAccounts = getPinnedAccounts();

            data.sort((a, b) => {
                const isPinnedA = pinnedAccounts.includes(a.account_name);
                const isPinnedB = pinnedAccounts.includes(b.account_name);

                // 1. 置顶优先
                if (isPinnedA && !isPinnedB) return -1;
                if (!isPinnedA && isPinnedB) return 1;

                // 2. 如果两个都置顶，按置顶顺序排序（后置顶的在前面）
                if (isPinnedA && isPinnedB) {
                    const indexA = pinnedAccounts.indexOf(a.account_name);
                    const indexB = pinnedAccounts.indexOf(b.account_name);
                    return indexB - indexA;
                }

                // 3. 如果两个都未置顶，按当前选择的列排序
                let valA, valB;

                if (sortColumn === 'account_name') {
                    // 使用自然排序
                    const result = naturalSort(a.account_name, b.account_name);
                    return sortDirection === 'asc' ? result : -result;
                } else if (sortColumn === 'gold_quantity') {
                    valA = a.gold_quantity || 0;
                    valB = b.gold_quantity || 0;
                    // 数字排序
                    const result = valA - valB;
                    return sortDirection === 'asc' ? result : -result;
                }
                
                // 默认回退
                return 0;
            });
        }
        // 智能刷新：检查用户是否正在交互
        function shouldRefresh() {
            const now = Date.now();
            const timeSinceLastInteraction = now - lastInteractionTime;

            // 如果正在保存数据，跳过刷新
            if (isSaving) {
                return false;
            }

            // 如果用户正在框选，跳过刷新
            if (isSelecting) {
                return false;
            }

            // 如果用户正在滚动，跳过刷新
            if (isScrolling) {
                return false;
            }

            // 如果用户正在输入或最近3秒内有交互，跳过刷新
            if (isUserInteracting || timeSinceLastInteraction < 3000) {
                return false;
            }

            // 检查是否有输入框获得焦点
            const activeElement = document.activeElement;
            if (activeElement && (activeElement.tagName === 'INPUT' || activeElement.tagName === 'TEXTAREA' || activeElement.tagName === 'SELECT')) {
                return false;
            }

            return true;
        }

        function loadData(forceRefresh = false) {
            // 如果不是强制刷新，检查是否应该刷新
            if (!forceRefresh && !shouldRefresh()) {

                            weekly_alliance_done: Boolean(account.weekly_alliance_done),
                            weekly_points_done: Boolean(account.weekly_points_done),
                            change: dashboardItem ? dashboardItem.change : 0,
                            banned_until: account.banned_until // 确保banned_until字段存在

                        return normalizedAccount;

                    renderData(data);

                .catch(error => {

function setupVirtualScroll(container) {
    virtualScrollState.container = container;
    // 改为监听 window 滚动

}

// 防抖滚动处理
let scrollTimer;
function onVirtualScroll(e) {
    if (scrollTimer) cancelAnimationFrame(scrollTimer);
    scrollTimer = requestAnimationFrame(() => {
        renderVirtualRows();
    });
}

function renderVirtualRows() {
    const container = virtualScrollState.container;
    if (!container) return;
    
    const scrollTop = window.scrollY;
    const viewportHeight = window.innerHeight;
    const rowHeight = virtualScrollState.rowHeight;
    const totalRows = allRowsData.length;
    
    const containerRect = container.getBoundingClientRect();
    const containerOffsetTop = containerRect.top + window.scrollY;
    const headerHeight = 55;
    
    const relativeScroll = scrollTop - (containerOffsetTop + headerHeight);
    
    const startIndex = Math.max(0, Math.floor(relativeScroll / rowHeight) - virtualScrollState.buffer);
    const endIndex = Math.min(totalRows, Math.ceil((relativeScroll + viewportHeight) / rowHeight) + virtualScrollState.buffer);
    
    // 移除过度优化，确保数据变化（如排序、刷新）时能及时更新DOM
    /*
    if (startIndex === virtualScrollState.lastStartIndex && endIndex === virtualScrollState.lastEndIndex) {
        return;
    }
    */
    
    virtualScrollState.lastStartIndex = startIndex;
    virtualScrollState.lastEndIndex = endIndex;
    
    const tbody = document.getElementById('virtualTableBody');
    if (!tbody) return;
    
    const paddingTop = startIndex * rowHeight;
    const paddingBottom = Math.max(0, (totalRows - endIndex) * rowHeight);
    
    let html = '';
    
    if (paddingTop > 0) {
        html += `<tr style="height: ${paddingTop}px; pointer-events: none;"><td colspan="13" style="padding:0; border:none;"></td></tr>`;
    }
    
    for (let i = startIndex; i < endIndex; i++) {

            html += `

                    <td colspan="13">

                        <div>${item.date}</div>
                    </td>

            `;
        } else {
            html += createTableRow(item);

    }
    
    if (paddingBottom > 0) {
        html += `<tr style="height: ${paddingBottom}px; pointer-events: none;"><td colspan="13" style="padding:0; border:none;"></td></tr>`;
    }
    
    tbody.innerHTML = html;

            const daysUntilSunday = (7 - beijing.getDay()) % 7;
            if (daysUntilSunday === 0 && beijing.getHours() >= 3) {
                // 如果今天是周日且已过凌晨4点，则下一次是下周日
                nextSunday.setDate(beijing.getDate() + 7);
            } else {
                nextSunday.setDate(beijing.getDate() + daysUntilSunday);
            }
            nextSunday.setHours(3, 0, 0, 0);

            const timeUntilReset = nextSunday - beijing;
            const daysLeft = Math.floor(timeUntilReset / (1000 * 60 * 60 * 24));
            const hoursLeft = Math.floor((timeUntilReset % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

            let statusText = `每周日凌晨3点自动复位所有任务`;
            if (daysLeft > 0) {
                statusText += ` (${daysLeft}天${hoursLeft}小时后)`;
            } else if (hoursLeft > 0) {
                statusText += ` (${hoursLeft}小时后)`;
            } else {
                statusText += ` (即将复位)`;
            }

            document.getElementById('auto-reset-info').textContent = statusText;
        }


        // 框选功能
        function setupSelectionBox() {
            const container = document.querySelector('.data-table-container');
            if (!container) return;

            container.addEventListener('mousedown', function (e) {
                // 只在空白区域开始框选，避开交互元素
                if (e.target.tagName === 'INPUT' ||
                    e.target.tagName === 'SELECT' ||
                    e.target.tagName === 'BUTTON' ||
                    e.target.closest('th') || // 避开表头 (用于排序)
                    e.target.closest('.task-checkbox') ||
                    e.target.closest('.pin-btn') ||
                    e.target.closest('.delete-btn') ||
                    e.target.closest('.ban-btn')) {
                    return;
                }

                isSelecting = true;
                startX = e.clientX - container.getBoundingClientRect().left;
                startY = e.clientY - container.getBoundingClientRect().top;

                // 创建选择框
                selectionBox = document.createElement('div');
                selectionBox.className = 'selection-box';
                selectionBox.style.left = startX + 'px';
                selectionBox.style.top = startY + 'px';
                selectionBox.style.width = '0px';
                selectionBox.style.height = '0px';
                container.appendChild(selectionBox);

                // e.preventDefault(); // 移除 preventDefault 以允许点击事件传播
            });

            document.addEventListener('mousemove', function (e) {
                if (!isSelecting || !selectionBox) return;

                const container = document.querySelector('.data-table-container');
                const currentX = e.clientX - container.getBoundingClientRect().left;
                const currentY = e.clientY - container.getBoundingClientRect().top;

                const left = Math.min(startX, currentX);
                const top = Math.min(startY, currentY);
                const width = Math.abs(currentX - startX);
                const height = Math.abs(currentY - startY);

                selectionBox.style.left = left + 'px';
                selectionBox.style.top = top + 'px';
                selectionBox.style.width = width + 'px';
                selectionBox.style.height = height + 'px';
            });

            document.addEventListener('mouseup', function (e) {
                if (!isSelecting || !selectionBox) return;

                // 获取选择框的位置和大小
                const boxRect = selectionBox.getBoundingClientRect();
                const containerRect = document.querySelector('.data-table-container').getBoundingClientRect();

                // 找到被框选的复选框
                const selectedCheckboxes = [];
                document.querySelectorAll('.task-checkbox').forEach(checkbox => {
                    const checkboxRect = checkbox.getBoundingClientRect();

                    // 检查复选框是否与选择框相交
                    if (checkboxRect.left < boxRect.right &&
                        checkboxRect.right > boxRect.left &&
                        checkboxRect.top < boxRect.bottom &&
                        checkboxRect.bottom > boxRect.top) {
                        selectedCheckboxes.push(checkbox);
                    }
                });

                // 对选中的复选框进行反向操作
                if (selectedCheckboxes.length > 0) {
                    // 按账号分组处理，确保每个账号的所有复选框状态都正确保存
                    const accountUpdates = {};

                    selectedCheckboxes.forEach(checkbox => {
                        checkbox.checked = !checkbox.checked;

                        const row = checkbox.closest('tr');
                        const accountName = row.getAttribute('data-account');

                        if (!accountUpdates[accountName]) {
                            // 获取该账号的完整数据
                            accountUpdates[accountName] = {
                                account_name: accountName,
                                weekly_fishing_done: row.querySelector('[data-field="weekly_fishing_done"]')?.checked || false,
                                weekly_boss_done: row.querySelector('[data-field="weekly_boss_done"]')?.checked || false,
                                weekly_alliance_done: row.querySelector('[data-field="weekly_alliance_done"]')?.checked || false,
                                weekly_points_done: row.querySelector('[data-field="weekly_points_done"]')?.checked || false,
                                group_name: row.querySelector('[data-field="group_name"]')?.value || '',
                                collect_level: parseInt(row.querySelector('[data-field="collect_level"]')?.value) || 0,
                                craft_level: parseInt(row.querySelector('[data-field="craft_level"]')?.value) || 0,
                                combat_level: parseInt(row.querySelector('[data-field="combat_level"]')?.value) || 0,
                                notes: row.querySelector('[data-field="notes"]')?.value || ''
                            };
                        } else {
                            // 更新该账号的复选框状态
                            const fieldName = checkbox.getAttribute('data-field');
                            accountUpdates[accountName][fieldName] = checkbox.checked;
                        }
                    });

                    // 批量保存所有受影响的账号
                    Object.values(accountUpdates).forEach(data => {
                        saveAccountDataWithFeedback(data.account_name, data, null);
                    });
                }

                // 清理选择框
                if (selectionBox && selectionBox.parentNode) {
                    selectionBox.parentNode.removeChild(selectionBox);
                }
                selectionBox = null;
                isSelecting = false;
            });
        }

        // 保存单个账号数据（带反馈）
        function saveAccountDataWithFeedback(accountName, data, element) {
            data.account_name = accountName;

            // 设置保存状态，暂停刷新
            isSaving = true;

            // 添加保存中的视觉反馈
            if (element && element.type === 'checkbox') {
                element.style.opacity = '0.6';
                element.style.pointerEvents = 'none';
            }

            fetch('/api/accounts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
                .then(response => response.json())
                .then(result => {
                    if (result.success) {
                        // 数据保存成功

                        // 成功保存的视觉反馈
                        if (element && element.type === 'checkbox') {
                            element.style.opacity = '1';
                            element.style.pointerEvents = 'auto';

                            // 短暂的成功动画
                            element.style.transform = 'scale(1.1)';
                            setTimeout(() => {
                                element.style.transform = 'scale(1)';
                            }, 150);
                        }
                    } else {
                        // 保存失败

                        // 保存失败时恢复原状态
                        if (element && element.type === 'checkbox') {
                            element.checked = !element.checked;
                            element.style.opacity = '1';
                            element.style.pointerEvents = 'auto';
                        }
                    }
                })
                .catch(error => {
                    // 网络错误

                    // 网络错误时恢复原状态
                    if (element && element.type === 'checkbox') {
                        element.checked = !element.checked;
                        element.style.opacity = '1';
                        element.style.pointerEvents = 'auto';
                    }
                })
                .finally(() => {
                    // 保存完成，恢复刷新
                    setTimeout(() => {
                        isSaving = false;
                    }, 500); // 给一点缓冲时间
                });
        }

        // 设置事件委托，替换原有的 bindAutoSaveEvents
        function setupEventDelegation() {
            const container = document.querySelector('.data-table'); // 绑定到 table 或 container
            if (!container) return;

            // 统一处理 Input/Change 事件
            container.addEventListener('change', handleInputChange);
            container.addEventListener('input', handleInputDebounced);
            container.addEventListener('keydown', handleInputKeydown);
            // blur 事件不冒泡，需要 useCapture
            container.addEventListener('blur', handleInputBlur, true);
        }

        // 处理 Change 事件 (Checkbox, Number change)
        function handleInputChange(e) {
            const target = e.target;
            if (!target.hasAttribute('data-field')) return;

            // 忽略 input[type=text] 的 change，由 input/blur 处理
            if (target.type === 'text' || target.tagName === 'TEXTAREA') return;

            saveRowData(target);
        }

        // 处理 Input 事件 (Text/Number typing) - 防抖
        let inputDebounceTimer;
        function handleInputDebounced(e) {
            const target = e.target;
            if (!target.hasAttribute('data-field')) return;
            if (target.type === 'checkbox') return;

            clearTimeout(inputDebounceTimer);
            inputDebounceTimer = setTimeout(() => {
                // 对于 text/textarea，输入时静默保存（不带反馈动画，或者轻微反馈）
                // 使用 saveAccountData 而不是 saveAccountDataWithFeedback 以避免打断输入
                const row = target.closest('tr');
                const accountName = row.getAttribute('data-account');
                const data = collectRowData(row, accountName);
                saveAccountData(accountName, data);
            }, 1000);
        }

        // 处理 Blur 事件
        function handleInputBlur(e) {
            const target = e.target;
            if (!target.hasAttribute('data-field')) return;
            if (target.type === 'text' || target.tagName === 'TEXTAREA') {
                const row = target.closest('tr');
                const accountName = row.getAttribute('data-account');
                const data = collectRowData(row, accountName);
                saveAccountData(accountName, data);
            }
        }

        // 处理 Keydown (Enter)
        function handleInputKeydown(e) {
            if (e.key === 'Enter') {
                const target = e.target;
                if (!target.hasAttribute('data-field')) return;
                
                const row = target.closest('tr');
                const accountName = row.getAttribute('data-account');
                const data = collectRowData(row, accountName);
                saveAccountData(accountName, data);
                target.blur(); // 移除焦点
            }
        }

        function startAutoRefresh() {
            // 如果socket已存在，则不再重复创建
            if (socket) {
                return;
            }
            try {
                if (typeof io === 'undefined') {
                    console.warn('Socket.io not loaded');
                    return;
                }
                socket = io();

                socket.on('connect', function() {
                    console.log('WebSocket connected!');
                });

            socket.on('initial_data', function(data) {
                console.log('Received initial data');
                renderData(data); // 使用一个新函数来渲染数据
            });

            socket.on('update_single_account', function(data) {
                console.log('Received single account update:', data);

                // 1. 更新数据源
                const index = allRowsData.findIndex(acc => !acc.isHeader && acc.account_name === data.account_name);
                if (index !== -1) {
                    allRowsData[index].gold_quantity = data.new_quantity;
                    allRowsData[index].change = data.new_change;
                }

                // 2. 如果行当前可见，直接更新DOM
                const row = document.querySelector(`tr[data-account="${data.account_name}"]`);
                if (row) {
                    const quantityCell = row.querySelector('.quantity-display');
                    if (quantityCell) quantityCell.textContent = formatNumber(data.new_quantity);

                    const changeCell = row.querySelector('.change-display');
                    if (changeCell) {
                        changeCell.textContent = `${data.new_change >= 0 ? '+' : ''}${formatNumber(data.new_change)}`;
                        changeCell.className = `change-display ${data.new_change >= 0 ? 'positive' : 'negative'}`;
                    }
                    row.classList.add('data-update');
                    setTimeout(() => row.classList.remove('data-update'), 1000);
                }

                // 3. 更新总计卡片
                document.getElementById('totalGold').textContent = formatNumber(data.total_gold);
                document.getElementById('totalChange').textContent = `${data.total_change >= 0 ? '+' : ''}${formatNumber(data.total_change)}`;
                
                // 4. 更新最后刷新时间
                document.getElementById('lastRefresh').textContent = `最后更新: ${new Date().toLocaleString('zh-CN')}`;
            });

            // 更新自动复位状态
            updateAutoResetStatus();
            // 每分钟更新一次自动复位状态
            setInterval(updateAutoResetStatus, 60000);

            // --- 新增：监听导出进度 ---
            socket.on('export_progress', function(data) {
                const progressBar = document.getElementById('progressBar');
                const progressStatus = document.getElementById('progressStatus');
                
                progressBar.style.width = data.percent + '%';
                progressBar.textContent = data.percent + '%';
                progressStatus.textContent = data.message;
            });

            socket.on('export_finished', function(data) {
                const modal = document.getElementById('progressModal');
                if (data.success) {
                    alert('✅ 数据导出成功！\n文件保存在: ' + data.path);
                } else {
                    alert('❌ 导出失败: ' + data.error);
                }
                modal.classList.remove('visible');
            });
            } catch (e) {
                console.error('Socket initialization failed:', e);
            }
        }

        // 设置列宽调整功能
        function setupColumnResize() {
            const table = document.querySelector('.data-table');
            if (!table) return;

            const resizers = document.querySelectorAll('.resizer');
            let isResizing = false;
            let currentResizer = null;
            let startX = 0;
            let startWidth = 0;

            resizers.forEach(resizer => {
                resizer.addEventListener('mousedown', function (e) {
                    e.preventDefault();
                    e.stopPropagation();

                    isResizing = true;
                    currentResizer = this;
                    startX = e.clientX;

                    const th = this.parentElement;
                    startWidth = th.offsetWidth;

                    document.addEventListener('mousemove', handleMouseMove);
                    document.addEventListener('mouseup', handleMouseUp);

                    // 防止文本选择
                    document.body.style.userSelect = 'none';
                });
            });

            function handleMouseMove(e) {
                if (!isResizing || !currentResizer) return;

                const th = currentResizer.parentElement;
                const diff = e.clientX - startX;
                const newWidth = Math.max(50, startWidth + diff); // 最小宽度50px

                th.style.width = newWidth + 'px';
            }

            function handleMouseUp() {
                if (isResizing) {
                    isResizing = false;
                    currentResizer = null;

                    // 保存列宽
                    saveColumnWidths();

                    // 恢复文本选择
                    document.body.style.userSelect = '';

                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                }
            }
        }

                document.addEventListener(eventType, function (e) {

                    // 延迟重置交互状态，给保存操作一些时间

        function startFirstTimeInitialization() {
            const modal = document.getElementById('initializationModal');
            const progressBar = document.getElementById('initializationProgressBar');
            const progressStatus = document.getElementById('initializationProgressStatus');

            // Show the modal
            modal.classList.add('visible');

            // Connect to socket.io
            socket = io();

            socket.on('connect', () => {
                console.log('Socket connected for initialization.');
                // Tell the server to start initializing
                socket.emit('start_initialization');
            });

            socket.on('initialization_progress', (data) => {
                progressBar.style.width = data.percent + '%';
                progressBar.textContent = data.percent + '%';
                progressStatus.textContent = data.message;
            });

            socket.on('initialization_finished', () => {
                progressStatus.textContent = '初始化完成！即将加载主面板...';
                setTimeout(() => {
                    modal.classList.remove('visible');
                    // Now that initialization is done, load the main page
                    // The socket connection will be reused by initializePage -> startAutoRefresh
                    initializePage();
                }, 1500); // Wait 1.5 seconds before closing
            });

            socket.on('initialization_failed', (data) => {
                progressBar.style.backgroundColor = '#ff6b6b';
                progressStatus.innerHTML = `❌ 初始化失败: ${data.error}<br>请检查后端日志并刷新页面重试。`;
            });
        }

        function initializePage() {

            container.classList.add('page-fade-in');

        function calculateCountdown(unbanDateStr) {
            if (!unbanDateStr) return '';
            const unbanDate = new Date(unbanDateStr);
            const now = new Date();
            const diff = unbanDate - now;

            if (diff <= 0) return '即将解封';

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

            return `${days}天${hours}时`;
        }

        function updateAllCountdowns() {
            document.querySelectorAll('.countdown').forEach(span => {
                const unbanDate = span.dataset.unbanDate;
                if (unbanDate) {
                    span.textContent = calculateCountdown(unbanDate);
                }
            });
        }

                document.querySelectorAll('.row-highlight').forEach(r => r.classList.remove('row-highlight'));

                // Scroll into view
                row.scrollIntoView({
                    behavior: 'smooth',
                    block: 'center'
                });

                // Add highlight class
                row.classList.add('row-highlight');

                // Remove highlight class after animation
                setTimeout(() => {
                    row.classList.remove('row-highlight');
                }, 3000);
            }
        }

        // 页面加载完成后开始自动刷新和交互检测
        document.addEventListener('DOMContentLoaded', function () {
            // First, check the application status
            fetch('/api/status')
                .then(response => response.json())
                .then(status => {
                    if (status.is_initialized) {
                        // If already initialized, proceed as normal
                        initializePage();
                    } else {
                        // If not initialized, start the initialization flow
                        startFirstTimeInitialization();
                    }
                })
                .catch(error => {
                    console.error('Error checking app status:', error);
                    // Show an error message on the page
                    document.body.innerHTML = `<div style="color:white; text-align:center; padding: 50px;"><h1>❌ 无法连接到服务器</h1><p>请确保后端服务已启动并重试。</p></div>`;

            // Add global click listener for tooltip account names
            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('tooltip-account-name')) {
                    const accountName = e.target.dataset.accountName;
                    if (accountName) {
                        // Hide the tooltip by temporarily disabling hover on the parent
                        const tooltipText = e.target.closest('.tooltip-text');
                        if (tooltipText) {

                            setTimeout(() => {

                            }, 300);
                        }

                    }
                }
            });
        });

        function resetGoldChange() {
            fetch('/api/reset-change', {
                method: 'POST'
            })
            .then(response => {
                if (!response.ok) {
                    // 如果HTTP响应状态不是200-299，也当作错误处理
                    throw new Error(`网络响应错误: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    alert(`✅ ${data.message}`);
                    loadData(true); // 强制刷新数据
                } else {
                    // 如果后端返回了JSON但success为false
                    alert(`❌ 重置失败: ${data.error || '未知错误'}`);
                }
            })
            .catch(error => {
                console.error('Error resetting gold change:', error);
                alert('❌ 重置变化时发生网络错误: ' + error.message);
            });
        }

        function exportData() {
            if (!socket || !socket.connected) {
                alert('❌ 无法连接到服务器，请刷新页面重试。');
                return;
            }

            if (!confirm('确定要将当前数据导出为 CSV 吗？')) {
                return;
            }

            // 显示进度条弹窗
            const modal = document.getElementById('progressModal');
            const progressBar = document.getElementById('progressBar');
            const progressStatus = document.getElementById('progressStatus');

            // 重置进度条
            progressBar.style.width = '0%';
            progressBar.textContent = '0%';
            progressStatus.textContent = '正在初始化...';
            modal.classList.add('visible');

            // 通过Socket.IO发送导出请求
            socket.emit('start_export');
        }

    </script>
</body>

</html>
